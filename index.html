  <title>Policistu arodbiedrība un citas sadarbības organizācijas – biedriem.lv</title>
  <meta name="description" content="Neatkarīgā policistu arodbiedrība.">

  <link rel="stylesheet" href="css/style.css">

  <style>
    .news-ticker {
      background: #123b82;
      color: white;
      padding: 10px 0;
      overflow: hidden;
      white-space: nowrap;
      font-size: 18px;
      cursor: pointer;
      margin: 20px 0 4px;
    }

    .news-track {
      display: inline-flex;
      gap: 40px;
      will-change: transform;
    }

    .org-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    .org-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      text-align: center;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 200px;
      min-height: 220px;
      transition: transform 0.2s;
    }

    .org-tile:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .org-title {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .org-logo {
      max-width: 120px;
      height: auto;
      display: block;
    }
  </style>
</head>
